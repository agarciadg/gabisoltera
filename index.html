<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Snoopy's Party Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap');

        * {
            box-sizing: border-box;
            touch-action: manipulation; /* Evita zoom accidental al tocar rápido */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: 'Architects Daughter', cursive;
            overflow: hidden;
        }

        #contenedor-juego {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 2 / 1; /* Mantiene la proporción estilo cómic */
            margin: 10px;
        }

        canvas {
            background-color: #89CFF0;
            border: 3px solid #000;
            border-radius: 4px;
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: crisp-edges;
        }

        .pantalla-mensaje {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-height: 90%;
            background: rgba(255, 255, 255, 0.98);
            padding: 20px;
            border: 3px solid #000;
            border-radius: 15px;
            text-align: center;
            display: none;
            flex-direction: column;
            justify-content: center;
            z-index: 100;
            overflow-y: auto;
        }

        h1 { font-size: 1.2rem; margin: 10px 0; text-transform: uppercase; }
        .info-detalle { font-size: 1.1rem; color: #d32f2f; font-weight: bold; margin: 10px 0; }
        .subtexto { font-size: 0.9rem; color: #333; }
        
        #img-game-over { max-width: 80px; margin: 10px auto; }

        .zigzag {
            width: 100%;
            height: 10px;
            background: linear-gradient(135deg, transparent 25%, #000 25%, #000 50%, transparent 50%, transparent 75%, #000 75%, #000 100%);
            background-size: 20px 20px;
        }

        /* Ajustes para pantallas muy pequeñas (celulares en vertical) */
        @media (max-width: 500px) {
            h1 { font-size: 1rem; }
            .info-detalle { font-size: 0.9rem; }
            #contenedor-juego { aspect-ratio: 4 / 3; } /* Más alto en móvil */
        }
    </style>
</head>
<body>

    <div id="contenedor-juego">
        <canvas id="juegoCanvas"></canvas>

        <div id="mensaje-victoria" class="pantalla-mensaje">
            <div class="zigzag"></div>
            <h1>¡Felicidades! Aquí tienes la información de tu despedida de soltera:</h1>
            <div class="info-detalle">
                Viernes 1 de mayo 20 hrs<br>
                Luis Beltrán 1660 depto 302, Ñuñoa.
            </div>
            <h1 style="background: #ffff00; padding: 5px; border: 2px solid #000; font-size: 1rem;">RECUERDA VENIR DE BLANCO.</h1>
            <div class="subtexto">Toca la pantalla para cerrar</div>
            <div class="zigzag" style="margin-top:10px"></div>
        </div>

        <div id="mensaje-derrota" class="pantalla-mensaje">
            <h1>¡GOOD GRIEF!</h1>
            <img id="img-game-over" src="derrota.png" alt="Snoopy">
            <div class="subtexto">¡Casi llegas!<br>Toca la pantalla para reintentar</div>
            <div class="zigzag" style="margin-top:10px"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('juegoCanvas');
        const ctx = canvas.getContext('2d');
        const contenedor = document.getElementById('contenedor-juego');

        // Ajuste de resolución interna del canvas
        function ajustarResolucion() {
            canvas.width = 800;
            canvas.height = 400;
        }
        ajustarResolucion();

        // --- IMÁGENES ---
        const imgPersonaje = new Image(); imgPersonaje.src = 'personaje.png';
        const imgMeta = new Image(); imgMeta.src = 'meta.png';
        const imgsObs = [];
        for(let i=1; i<=6; i++) {
            let img = new Image(); img.src = `obs${i}.png`;
            imgsObs.push(img);
        }

        // --- VARIABLES ---
        let juegoActivo = true;
        let velocidadJuego = 5;
        let distancia = 0;
        const META_FINAL = 15000; // Ajustado para que sea divertido en móvil
        const sueloY = 340;

        const personaje = {
            x: 50, y: 200, w: 60, h: 60,
            vy: 0, g: 0.8, salto: -15, suelo: false,
            dibujar() {
                if(imgPersonaje.complete && imgPersonaje.naturalWidth !== 0) {
                    ctx.drawImage(imgPersonaje, this.x, this.y, this.w, this.h);
                } else {
                    ctx.fillStyle = "white"; ctx.strokeStyle = "black"; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(this.x+30, this.y+30, 25, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                }
            },
            update() {
                this.vy += this.g;
                this.y += this.vy;
                if(this.y + this.h > sueloY) {
                    this.y = sueloY - this.h;
                    this.vy = 0;
                    this.suelo = true;
                } else { this.suelo = false; }
            }
        };

        let obstaculos = [];
        let metaObj = null;

        function manejarObstaculos() {
            if(distancia > META_FINAL - 1000) return;
            if(Math.random() < 0.02 && (obstaculos.length === 0 || (canvas.width - obstaculos[obstaculos.length-1].x > 300))) {
                let tipo = Math.floor(Math.random()*6);
                let flote = Math.random() > 0.7;
                obstaculos.push({
                    x: canvas.width,
                    y: flote ? sueloY - 140 : sueloY - 60,
                    w: 60, h: 60, t: tipo
                });
            }
            obstaculos.forEach((o, i) => {
                o.x -= velocidadJuego;
                if(imgsObs[o.t].complete && imgsObs[o.t].naturalWidth !== 0) {
                    ctx.drawImage(imgsObs[o.t], o.x, o.y, o.w, o.h);
                } else {
                    ctx.strokeRect(o.x, o.y, o.w, o.h);
                }
                if(checkCol(personaje, o)) fin(false);
            });
            obstaculos = obstaculos.filter(o => o.x + o.w > 0);
        }

        function loop() {
            if(!juegoActivo) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            distancia += velocidadJuego;
            velocidadJuego = 5 + (distancia/5000);

            // Suelo
            ctx.fillStyle = "#748C2B";
            ctx.fillRect(0, sueloY, canvas.width, canvas.height - sueloY);
            ctx.strokeStyle = "#000"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(0, sueloY); ctx.lineTo(canvas.width, sueloY); ctx.stroke();

            personaje.update();
            personaje.dibujar();
            manejarObstaculos();

            if(distancia >= META_FINAL && !metaObj) {
                metaObj = { x: canvas.width, y: 0, w: 100, h: sueloY };
            }

            if(metaObj) {
                metaObj.x -= velocidadJuego;
                if(imgMeta.complete && imgMeta.naturalWidth !== 0) {
                    ctx.drawImage(imgMeta, metaObj.x, sueloY - 120, 120, 120);
                }
                if(personaje.x + personaje.w > metaObj.x) fin(true);
            }

            requestAnimationFrame(loop);
        }

        function checkCol(p, o) {
            return p.x < o.x + o.w - 15 && p.x + p.w - 15 > o.x &&
                   p.y < o.y + o.h - 15 && p.y + p.h - 15 > o.y;
        }

        function fin(ganaste) {
            juegoActivo = false;
            document.getElementById(ganaste ? 'mensaje-victoria' : 'mensaje-derrota').style.display = 'flex';
        }

        function reiniciar() {
            distancia = 0; velocidadJuego = 5; obstaculos = []; metaObj = null;
            personaje.y = 200; juegoActivo = true;
            document.getElementById('mensaje-victoria').style.display = 'none';
            document.getElementById('mensaje-derrota').style.display = 'none';
            loop();
        }

        // --- CONTROLES UNIFICADOS (PC Y MÓVIL) ---
        function accionPrincipal() {
            if(juegoActivo) {
                if(personaje.suelo) personaje.vy = personaje.salto;
            } else {
                if(document.getElementById('mensaje-derrota').style.display === 'flex') {
                    reiniciar();
                }
            }
        }

        window.addEventListener('keydown', (e) => { if(e.code === 'Space') accionPrincipal(); });
        window.addEventListener('touchstart', (e) => { 
            // Evita que el toque haga cosas raras en el navegador
            if(e.target.id === 'juegoCanvas' || !juegoActivo) {
                accionPrincipal();
            }
        });

        loop();
    </script>
</body>
</html>
