<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Gabi's BIG Bachelorette Adventure</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap');

        * {
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #fcfaf2; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: 'Architects Daughter', cursive;
            overflow: hidden;
        }

        #contenedor-juego {
            position: relative;
            width: 100%;
            max-width: 1000px; /* Un poco más ancho para dar espacio */
            aspect-ratio: 2 / 1;
            margin: 10px;
        }

        canvas {
            background-color: #89CFF0; 
            border: 5px solid #000; /* Borde más grueso */
            border-radius: 4px;
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: crisp-edges;
        }

        .pantalla-mensaje {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            background: #fff;
            padding: 30px;
            border: 5px solid #000;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 100;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
            overflow-y: auto;
            max-height: 95%;
        }

        h1 { 
            font-size: 2rem; /* Texto más grande */
            margin: 15px 0; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            -webkit-text-stroke: 1.5px #000;
        }

        p { font-size: 1.3rem; line-height: 1.4; }

        .info-detalle { 
            font-size: 1.5rem; /* Texto más grande */
            color: #000; 
            margin: 20px 0; 
            padding: 15px;
            border: 3px dashed #000;
        }

        .boton-peanuts {
            background: #FFD200; 
            border: 4px solid #000;
            padding: 15px 40px;
            font-family: 'Architects Daughter', cursive;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 6px 6px 0px #000;
            text-transform: uppercase;
        }

        .boton-peanuts:active {
            transform: translate(3px, 3px);
            box-shadow: 3px 3px 0px #000;
        }

        .zigzag {
            width: 100%;
            height: 25px; /* Zigzag más grande */
            background: 
                linear-gradient(135deg, transparent 25%, #000 25%, #000 50%, transparent 50%, transparent 75%, #000 75%, #000 100%),
                linear-gradient(225deg, transparent 25%, #000 25%, #000 50%, transparent 50%, transparent 75%, #000 75%, #000 100%);
            background-size: 50px 50px;
            margin: 15px 0;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            p { font-size: 1.1rem; }
            .info-detalle { font-size: 1.2rem; }
            .boton-peanuts { font-size: 1.2rem; padding: 10px 30px; }
            #contenedor-juego { aspect-ratio: 4 / 3; }
        }
    </style>
</head>
<body>

    <div id="contenedor-juego">
        <canvas id="juegoCanvas"></canvas>

        <div id="pantalla-inicio" class="pantalla-mensaje">
            <h1>¡Hola Gabi!</h1>
            <div class="zigzag"></div>
            <p>Supera los obstáculos para llegar a la Meta y conocer los detalles de tu despedida.</p>
            <h1>¡Suerte!</h1>
            <button class="boton-peanuts" onclick="empezarJuego()">¡Jugar!</button>
        </div>

        <div id="mensaje-victoria" class="pantalla-mensaje" style="display: none;">
            <h1>¡LO LOGRASTE GABI!</h1>
            <div class="zigzag"></div>
            <div class="info-detalle">
                Viernes 1 de mayo • 20:00 hrs<br>
                Luis Beltrán 1660 depto 302, Ñuñoa.
            </div>
            <h1 style="background: #FFD200; padding: 10px; border: 4px solid #000;">VENIR DE BLANCO</h1>
            <div class="zigzag"></div>
        </div>

        <div id="mensaje-derrota" class="pantalla-mensaje" style="display: none;">
            <h1>¡GOOD GRIEF!</h1>
            <img src="derrota.png" alt="" style="max-width: 120px; margin: 15px;" onerror="this.style.display='none'">
            <p>¡Casi llegas, Gabi!</p>
            <button class="boton-peanuts" onclick="reiniciar()">Intentar otra vez</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('juegoCanvas');
        const ctx = canvas.getContext('2d');

        // AUMENTO DE RESOLUCIÓN INTERNA
        canvas.width = 1200;
        canvas.height = 600;

        const imgPers = new Image(); imgPers.src = 'personaje.png';
        const imgMeta = new Image(); imgMeta.src = 'meta.png';
        const imgsObs = [];
        for(let i=1; i<=6; i++) {
            let img = new Image(); img.src = `obs${i}.png`;
            imgsObs.push(img);
        }

        let juegoActivo = false;
        let velocidad = 6; // Un poco más rápido para compensar el tamaño
        let distancia = 0;
        const META_FINAL = 25000; // Más distancia porque todo es más grande
        const sueloY = 520; // Suelo más bajo

        const personaje = {
            // TAMAÑO AGRANDADO (Casi el doble)
            x: 100, y: 300, w: 110, h: 110,
            // FÍSICA AJUSTADA PARA EL NUEVO TAMAÑO
            vy: 0, g: 1.0, salto: -22, suelo: false,
            dibujar() {
                if(imgPers.complete && imgPers.naturalWidth !== 0) {
                    ctx.drawImage(imgPers, this.x, this.y, this.w, this.h);
                } else {
                    ctx.fillStyle = "#fff"; ctx.strokeStyle = "#000"; ctx.lineWidth = 4;
                    ctx.beginPath(); ctx.ellipse(this.x+55, this.y+55, 50, 40, 0, 0, Math.PI*2);
                    ctx.fill(); ctx.stroke();
                    ctx.fillStyle = "#000"; ctx.fillRect(this.x+15, this.y+30, 20, 40); 
                }
            },
            update() {
                this.vy += this.g;
                this.y += this.vy;
                if(this.y + this.h > sueloY) {
                    this.y = sueloY - this.h;
                    this.vy = 0;
                    this.suelo = true;
                } else { this.suelo = false; }
            }
        };

        let obstaculos = [];
        let metaObj = null;

        function manejarObs() {
            if(distancia > META_FINAL - 2000) return;
            // Spawning ajustado para objetos más grandes
            if(Math.random() < 0.02 && (obstaculos.length === 0 || (canvas.width - obstaculos[obstaculos.length-1].x > 500))) {
                let tipo = Math.floor(Math.random()*6);
                let flote = Math.random() > 0.75;
                // OBSTÁCULOS AGRANDADOS
                let tamaño = 100 + Math.random()*20;
                obstaculos.push({
                    x: canvas.width,
                    y: flote ? sueloY - tamaño - 130 : sueloY - tamaño,
                    w: tamaño, h: tamaño, t: tipo
                });
            }
            obstaculos.forEach((o) => {
                o.x -= velocidad;
                if(imgsObs[o.t].complete && imgsObs[o.t].naturalWidth !== 0) {
                    ctx.drawImage(imgsObs[o.t], o.x, o.y, o.w, o.h);
                } else {
                    ctx.fillStyle = "#fff"; ctx.strokeStyle = "#000"; ctx.lineWidth = 4;
                    ctx.strokeRect(o.x, o.y, o.w, o.h);
                }
                if(checkCol(personaje, o)) fin(false);
            });
            obstaculos = obstaculos.filter(o => o.x + o.w > 0);
        }

        function loop() {
            if(!juegoActivo) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            distancia += velocidad;
            velocidad = 6 + (distancia/6000);

            ctx.fillStyle = "#748C2B";
            ctx.fillRect(0, sueloY, canvas.width, canvas.height - sueloY);
            ctx.strokeStyle = "#000"; ctx.lineWidth = 5;
            ctx.beginPath(); ctx.moveTo(0, sueloY); ctx.lineTo(canvas.width, sueloY); ctx.stroke();

            personaje.update();
            personaje.dibujar();
            manejarObs();

            if(distancia >= META_FINAL && !metaObj) {
                metaObj = { x: canvas.width, y: 0, w: 200, h: sueloY };
            }

            if(metaObj) {
                metaObj.x -= velocidad;
                if(imgMeta.complete && imgMeta.naturalWidth !== 0) {
                    // META AGRANDADA
                    ctx.drawImage(imgMeta, metaObj.x, sueloY - 250, 250, 250);
                }
                if(personaje.x + personaje.w > metaObj.x + 60) fin(true);
            }
            requestAnimationFrame(loop);
        }

        function checkCol(p, o) {
            // Hitboxes ajustadas para el nuevo tamaño
            return p.x < o.x + o.w - 30 && p.x + p.w - 30 > o.x &&
                   p.y < o.y + o.h - 25 && p.y + p.h - 25 > o.y;
        }

        function empezarJuego() {
            document.getElementById('pantalla-inicio').style.display = 'none';
            juegoActivo = true;
            loop();
        }

        function fin(ganaste) {
            juegoActivo = false;
            document.getElementById(ganaste ? 'mensaje-victoria' : 'mensaje-derrota').style.display = 'flex';
        }

        function reiniciar() {
            distancia = 0; velocidad = 6; obstaculos = []; metaObj = null;
            personaje.y = 300; personaje.vy = 0; juegoActivo = true;
            document.getElementById('mensaje-derrota').style.display = 'none';
            loop();
        }

        window.addEventListener('keydown', (e) => { 
            if(e.code === 'Space' || e.code === 'ArrowUp') {
                if(juegoActivo && personaje.suelo) personaje.vy = personaje.salto;
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(juegoActivo && personaje.suelo) personaje.vy = personaje.salto;
        }, {passive: false});

    </script>
</body>
</html>
