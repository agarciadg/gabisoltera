<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Gabi's Bachelorette Party</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap');

        * {
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #fcfaf2; 
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Architects Daughter', cursive;
            overflow: hidden; /* Bloquea el scroll por completo */
        }

        #contenedor-juego {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #89CFF0; /* Azul cielo por si falla el canvas */
        }

        canvas {
            background-color: #89CFF0; 
            display: block;
            image-rendering: crisp-edges;
            max-width: 100%;
            max-height: 100%;
        }

        /* Pantallas de Mensaje optimizadas para no scrollear */
        .pantalla-mensaje {
            position: absolute;
            width: 85%;
            max-width: 500px;
            max-height: 90vh; /* Nunca más alto que la pantalla */
            background: #fff;
            padding: 15px;
            border: 4px solid #000;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-around; /* Distribuye elementos para ahorrar espacio */
            align-items: center;
            z-index: 100;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
        }

        h1 { 
            font-size: 1.4rem; 
            margin: 5px 0; 
            text-transform: uppercase; 
            -webkit-text-stroke: 1px #000;
        }

        p { font-size: 1rem; margin: 5px 0; line-height: 1.2; }

        .info-detalle { 
            font-size: 1.1rem; 
            color: #000; 
            margin: 10px 0; 
            padding: 8px;
            border: 2px dashed #000;
            width: 100%;
        }

        .boton-peanuts {
            background: #FFD200; 
            border: 3px solid #000;
            padding: 10px 25px;
            font-family: 'Architects Daughter', cursive;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            text-transform: uppercase;
        }

        .zigzag {
            width: 100%;
            height: 15px;
            background: linear-gradient(135deg, transparent 25%, #000 25%, #000 50%, transparent 50%, transparent 75%, #000 75%, #000 100%);
            background-size: 30px 30px;
            margin: 5px 0;
        }

        /* Ajustes específicos para móviles en vertical */
        @media (max-height: 500px) {
            h1 { font-size: 1.1rem; }
            p { font-size: 0.9rem; }
            .info-detalle { font-size: 0.9rem; margin: 5px 0; }
            .zigzag { height: 10px; background-size: 20px 20px; }
        }
    </style>
</head>
<body>

    <div id="contenedor-juego">
        <canvas id="juegoCanvas"></canvas>

        <div id="pantalla-inicio" class="pantalla-mensaje">
            <div class="zigzag"></div>
            <h1>¡Hola Gabi!</h1>
            <p>Supera los obstáculos para llegar a la Meta y conocer los detalles de tu despedida.</p>
            <button class="boton-peanuts" onclick="empezarJuego()">¡Jugar!</button>
            <div class="zigzag"></div>
        </div>

        <div id="mensaje-victoria" class="pantalla-mensaje" style="display: none;">
            <h1>¡LO LOGRASTE GABI!</h1>
            <div class="info-detalle">
                Viernes 1 de mayo • 20:00 hrs<br>
                Luis Beltrán 1660 depto 302, Ñuñoa.
            </div>
            <h1 style="background: #FFD200; padding: 5px; border: 3px solid #000; font-size: 1rem;">VENIR DE BLANCO</h1>
            <div class="zigzag"></div>
        </div>

        <div id="mensaje-derrota" class="pantalla-mensaje" style="display: none;">
            <h1>¡GOOD GRIEF!</h1>
            <p>¡Casi llegas, Gabi!</p>
            <button class="boton-peanuts" onclick="reiniciar()">Reintentar</button>
            <div class="zigzag"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('juegoCanvas');
        const ctx = canvas.getContext('2d');

        // Función para ajustar el canvas al tamaño real de la pantalla
        function redimensionar() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Ajustar el suelo proporcionalmente
            sueloY = canvas.height * 0.85;
            personaje.y = sueloY - personaje.h;
        }

        const imgPers = new Image(); imgPers.src = 'personaje.png';
        const imgMeta = new Image(); imgMeta.src = 'meta.png';
        const imgsObs = [];
        for(let i=1; i<=6; i++) {
            let img = new Image(); img.src = `obs${i}.png`;
            imgsObs.push(img);
        }

        let juegoActivo = false;
        let velocidad = 5;
        let distancia = 0;
        let sueloY = 0;
        const META_FINAL = 12000; 

        const personaje = {
            x: 50, y: 0, w: 90, h: 90, // Tamaño grande
            vy: 0, g: 0.8, salto: -18, suelo: false,
            dibujar() {
                if(imgPers.complete && imgPers.naturalWidth !== 0) {
                    ctx.drawImage(imgPers, this.x, this.y, this.w, this.h);
                } else {
                    ctx.fillStyle = "#fff"; ctx.strokeStyle = "#000"; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.arc(this.x+45, this.y+45, 40, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                }
            },
            update() {
                this.vy += this.g;
                this.y += this.vy;
                if(this.y + this.h > sueloY) {
                    this.y = sueloY - this.h;
                    this.vy = 0;
                    this.suelo = true;
                } else { this.suelo = false; }
            }
        };

        let obstaculos = [];
        let metaObj = null;

        function manejarObs() {
            if(distancia > META_FINAL - 1500) return;
            if(Math.random() < 0.02 && (obstaculos.length === 0 || (canvas.width - obstaculos[obstaculos.length-1].x > canvas.width * 0.4))) {
                let tipo = Math.floor(Math.random()*6);
                let flote = Math.random() > 0.8;
                let tam = 80 + Math.random()*20;
                obstaculos.push({
                    x: canvas.width,
                    y: flote ? sueloY - tam - 100 : sueloY - tam,
                    w: tam, h: tam, t: tipo
                });
            }
            obstaculos.forEach((o) => {
                o.x -= velocidad;
                if(imgsObs[o.t].complete && imgsObs[o.t].naturalWidth !== 0) {
                    ctx.drawImage(imgsObs[o.t], o.x, o.y, o.w, o.h);
                } else {
                    ctx.lineWidth = 3; ctx.strokeRect(o.x, o.y, o.w, o.h);
                }
                if(checkCol(personaje, o)) fin(false);
            });
            obstaculos = obstaculos.filter(o => o.x + o.w > 0);
        }

        function loop() {
            if(!juegoActivo) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            distancia += velocidad;
            velocidad = 5 + (distancia/5000);

            // Dibujar suelo
            ctx.fillStyle = "#748C2B";
            ctx.fillRect(0, sueloY, canvas.width, canvas.height - sueloY);
            ctx.strokeStyle = "#000"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(0, sueloY); ctx.lineTo(canvas.width, sueloY); ctx.stroke();

            personaje.update();
            personaje.dibujar();
            manejarObs();

            if(distancia >= META_FINAL && !metaObj) {
                metaObj = { x: canvas.width, y: 0, w: 150, h: sueloY };
            }

            if(metaObj) {
                metaObj.x -= velocidad;
                if(imgMeta.complete && imgMeta.naturalWidth !== 0) {
                    ctx.drawImage(imgMeta, metaObj.x, sueloY - 180, 180, 180);
                }
                if(personaje.x + personaje.w > metaObj.x + 30) fin(true);
            }
            requestAnimationFrame(loop);
        }

        function checkCol(p, o) {
            return p.x < o.x + o.w - 25 && p.x + p.w - 25 > o.x &&
                   p.y < o.y + o.h - 20 && p.y + p.h - 20 > o.y;
        }

        function empezarJuego() {
            document.getElementById('pantalla-inicio').style.display = 'none';
            juegoActivo = true;
            redimensionar();
            loop();
        }

        function fin(ganaste) {
            juegoActivo = false;
            document.getElementById(ganaste ? 'mensaje-victoria' : 'mensaje-derrota').style.display = 'flex';
        }

        function reiniciar() {
            distancia = 0; velocidad = 5; obstaculos = []; metaObj = null;
            personaje.vy = 0; juegoActivo = true;
            document.getElementById('mensaje-derrota').style.display = 'none';
            loop();
        }

        // Eventos
        window.addEventListener('resize', redimensionar);
        window.addEventListener('keydown', (e) => { 
            if(e.code === 'Space' || e.code === 'ArrowUp') {
                if(juegoActivo && personaje.suelo) personaje.vy = personaje.salto;
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(juegoActivo && personaje.suelo) personaje.vy = personaje.salto;
        }, {passive: false});

        redimensionar();
    </script>
</body>
</html>
